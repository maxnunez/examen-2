{% extends "base.html" %}
{% block title %}500 - Error del servidor{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="text-center">
    <h1 class="display-1 fw-bold text-danger">500</h1>
    <i class="bi bi-exclamation-triangle fs-1 text-muted d-block mb-3"></i>
    <h3 class="mb-3">Error interno del servidor</h3>
    <p class="text-muted mb-4">Algo salió mal. Por favor intenta nuevamente en unos minutos.</p>
    <a href="{{ url_for('DashboardView.index') }}" class="btn btn-danger"><i class="bi bi-arrow-clockwise me-1"></i>Reintentar</a>
  </div>
</div>
{% endblock %}
