{% extends "base.html" %}
{% block title %}Ingresos - {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="page-header bg-gradient-header mb-4">
  <div class="container py-4">
    <h1 class="h2 mb-1"><i class="bi bi-bar-chart-line me-2"></i>Ingresos diarios</h1>
    <p class="text-muted mb-0">Evolución de ingresos últimos 30 días</p>
  </div>
</div>

<div class="page-wrapper">
  <div class="container pb-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="chart-container">
          <canvas id="chartIngresos"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
new Chart(document.getElementById('chartIngresos'), {
  type: 'line',
  data: {
    labels: {{ labels | tojson }},
    datasets: [{
      label: 'Ingresos (Bs)',
      data: {{ values | tojson }},
      borderColor: '#0d6efd',
      backgroundColor: 'rgba(13,110,253,0.1)',
      fill: true,
      tension: 0.3,
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: { label: ctx => 'Bs ' + ctx.parsed.y.toFixed(2) }
      }
    },
    scales: {
      y: {
        ticks: { callback: v => 'Bs ' + v.toFixed(2) }
      }
    }
  }
});
</script>
{% endblock %}
