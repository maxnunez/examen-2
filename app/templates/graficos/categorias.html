{% extends "base.html" %}
{% block title %}Platos por Categoría - {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="page-header bg-gradient-header mb-4">
  <div class="container py-4">
    <h1 class="h2 mb-1"><i class="bi bi-bar-chart me-2"></i>Platos por Categoría</h1>
    <p class="text-muted mb-0">Cantidad de platos agrupados por categoría</p>
  </div>
</div>

<div class="page-wrapper">
  <div class="container pb-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="chart-container">
          <canvas id="chartCategorias"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const colores = ['#0d6efd','#198754','#ffc107','#dc3545','#0dcaf0','#6f42c1','#fd7e14','#20c997'];
new Chart(document.getElementById('chartCategorias'), {
  type: 'bar',
  data: {
    labels: {{ labels | tojson }},
    datasets: [{
      label: 'Platos',
      data: {{ values | tojson }},
      backgroundColor: colores.slice(0, {{ values | length }}),
      borderRadius: 6,
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
    },
    scales: {
      y: {
        beginAtZero: true,
        ticks: { stepSize: 1 }
      }
    }
  }
});
</script>
{% endblock %}
