{% extends "base.html" %}
{% block title %}Estado de Pedidos - {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="page-header bg-gradient-header mb-4">
  <div class="container py-4">
    <h1 class="h2 mb-1"><i class="bi bi-pie-chart me-2"></i>Distribución de Pedidos</h1>
    <p class="text-muted mb-0">Estado actual de todos los pedidos</p>
  </div>
</div>

<div class="page-wrapper">
  <div class="container pb-4">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm">
          <div class="card-body text-center">
            <div class="chart-container">
              <canvas id="chartEstados"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
new Chart(document.getElementById('chartEstados'), {
  type: 'doughnut',
  data: {
    labels: {{ labels | tojson }},
    datasets: [{
      data: {{ values | tojson }},
      backgroundColor: {{ colores | tojson }},
      borderWidth: 2,
      borderColor: '#fff',
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { position: 'bottom' },
      tooltip: {
        callbacks: {
          label: ctx => ctx.label + ': ' + ctx.parsed + ' pedidos'
        }
      }
    }
  }
});
</script>
{% endblock %}
